name: Preset Validation

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for preset in presets/*/manifest.json; do
            echo "Validating $preset..."
            jq . "$preset" > /dev/null || exit 1
          done
          echo "✓ All presets valid"
